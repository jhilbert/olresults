name: Sync results and deploy

on:
  schedule:
    - cron: "20 2 * * *"   # nightly, 02:20 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync ANNE data
        if: github.event_name != 'push'
        run: |
          python3 ingest/anne_sync.py
          python3 ingest/build_club_dict.py
          python3 ingest/parse_sportsoftware_html.py
          python3 ingest/parse_sportsoftware_pdf.py
          python3 ingest/parse_sportsoftware_text.py
          python3 ingest/parse_club_table.py

      - name: Commit new snapshots
        if: github.event_name != 'push'
        run: |
          git config user.name "olresults-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly ANNE sync"
          git push

      - name: Build database
        run: python3 build/build_db.py

      - name: Cache-bust app shell
        # GitHub Pages sets cache-control: max-age=600 on every static file
        # with no way to override it, and mobile Safari in particular can
        # hold onto that well past its stated lifetime. Give style.css and
        # app.js a version query tied to this run, and expose the same
        # version to app.js so every normal page load - not just a manual
        # refresh - fetches the current deploy's database too.
        run: |
          V="${GITHUB_SHA:0:8}-${GITHUB_RUN_NUMBER}"
          sed -i "s/style.css\"/style.css?v=$V\"/; s/app.js\"/app.js?v=$V\"/" site/index.html
          sed -i "s#<script src=\"app.js?v=$V\"></script>#<script>window.OLR_BUILD=\"$V\";</script>\n<script src=\"app.js?v=$V\"></script>#" site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
